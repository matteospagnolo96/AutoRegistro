<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Car & Moto Tracker Pro Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { background-color: #0f0f13; color: #e5e7eb; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background-color: #1e1e24; border-radius: 1.25rem; border: 1px solid #2a2a32; }
        .input-dark { background-color: #16161c; border: 1px solid #2a2a32; color: white; border-radius: 0.75rem; padding: 0.8rem; width: 100%; outline: none; font-size: 0.9rem; }
        .input-dark:focus { border-color: #f97316; }
        .btn-orange { background-color: #f97316; color: black; font-weight: 800; border-radius: 0.75rem; padding: 1rem; width: 100%; cursor: pointer; text-transform: uppercase; }
        .nav-top-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; font-size: 0.65rem; font-weight: 700; color: #6b7280; flex: 1; padding: 0.8rem 0; border-bottom: 2px solid transparent; }
        .nav-top-item.active { color: #f97316; border-bottom: 2px solid #f97316; background: linear-gradient(to bottom, transparent, rgba(249, 115, 22, 0.05)); }
        .vehicle-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #16161c; border: 1px solid #2a2a32; display: none; z-index: 100; border-radius: 0 0 1rem 1rem; }
        .vehicle-dropdown.show { display: block; }
        .v-opt { padding: 1rem; border-bottom: 1px solid #2a2a32; color: #9ca3af; cursor: pointer; }
        .badge-deadline { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 0.5rem; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <div id="app" class="max-w-md mx-auto">
        <header class="bg-[#0f0f13] border-b border-gray-800/50 sticky top-0 z-50">
            <div class="p-4 flex items-center justify-between cursor-pointer" onclick="toggleMenu()">
                <div class="flex items-center gap-3">
                    <div class="bg-[#1e1e24] p-2.5 rounded-xl border border-gray-800 shadow-lg">
                        <i id="headerIcon" class="bi bi-car-front-fill text-orange-500 text-xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span id="vName" class="text-lg font-black text-white uppercase leading-none tracking-tight">Caricamento...</span>
                        <div class="flex items-center gap-1.5 mt-1">
                            <span id="vTarga" class="text-[10px] text-gray-400 font-mono font-bold">------</span>
                            <span class="text-gray-600 text-[10px]">•</span>
                            <span id="vAnno" class="text-[10px] text-gray-400 font-bold">----</span>
                        </div>
                    </div>
                    <i class="bi bi-chevron-down text-orange-500 text-xs ml-auto"></i>
                </div>
            </div>
            <div id="vMenu" class="vehicle-dropdown shadow-2xl"></div>

            <nav class="flex justify-around border-t border-gray-800/30">
                <button onclick="switchTab('dashboard')" class="nav-top-item active" id="t-dashboard"><i class="bi bi-grid-1x2-fill text-lg"></i>Dashboard</button>
                <button onclick="switchTab('km')" class="nav-top-item" id="t-km"><i class="bi bi-speedometer2 text-lg"></i>Km</button>
                <button onclick="switchTab('maint')" class="nav-top-item" id="t-maint"><i class="bi bi-tools text-lg"></i>Officina</button>
                <button onclick="switchTab('settings')" class="nav-top-item" id="t-settings"><i class="bi bi-plus-circle text-lg"></i>Mezzi</button>
            </nav>
        </header>

        <div id="content" class="p-4 space-y-4 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAL4DrFQdOOwjNeNADv1aO4uAa5Lz1AD9s",
            authDomain: "autoregistro-bc770.firebaseapp.com",
            projectId: "autoregistro-bc770",
            storageBucket: "autoregistro-bc770.firebasestorage.app",
            messagingSenderId: "503626529752",
            appId: "1:503626529752:web:90f84ddead5faf2385d0ad"
        };

        const app = initializeApp(firebaseConfig);
        const db_cloud = getFirestore(app);
        const USER_ID = "default_user"; // Puoi cambiarlo per separare i garage

        // Variabili Globali
        window.db = JSON.parse(localStorage.getItem('carTrackerDB_v4')) || { activeId: null, vehicles: [] };
        window.editingId = null;

        // --- FUNZIONI CORE ---
        window.save = async function() {
            localStorage.setItem('carTrackerDB_v4', JSON.stringify(window.db));
            try {
                await setDoc(doc(db_cloud, "garages", USER_ID), window.db);
                console.log("Cloud Sync: OK");
            } catch (e) { console.error("Cloud Sync: Error", e); }
        }

        window.loadFromCloud = async function() {
            const docRef = doc(db_cloud, "garages", USER_ID);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                window.db = docSnap.data();
                localStorage.setItem('carTrackerDB_v4', JSON.stringify(window.db));
                console.log("Dati caricati dal Cloud");
            }
            updateHeader();
            render('dashboard');
        }

        // --- UI & NAVIGATION ---
        const iconMap = { 'Tagliando': 'bi-wrench-adjustable', 'Revisione': 'bi-calendar-check', 'Cambio Gomme': 'bi-disc', 'Inversione Gomme': 'bi-arrow-repeat', 'Ricambi': 'bi-box-seam', 'Altro': 'bi-gear' };

        window.toggleMenu = () => document.getElementById('vMenu').classList.toggle('show');
        
        window.switchTab = (tab) => {
            document.querySelectorAll('.nav-top-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`t-${tab}`).classList.add('active');
            render(tab);
        }

        window.render = function(tab) {
            const cont = document.getElementById('content');
            const v = window.db.vehicles.find(x => x.id === window.db.activeId);
            
            if (!v && tab !== 'settings') {
                cont.innerHTML = `<div class="card p-10 text-center border-dashed"><i class="bi bi-plus-lg text-orange-500 text-4xl mb-4 block"></i><p class="text-gray-400 text-sm">Configura il tuo mezzo nella scheda <b>Mezzi</b>.</p></div>`;
                return;
            }

            if (tab === 'dashboard') {
                const sortedData = getAllKmSorted(v);
                const lastEntry = sortedData.length ? sortedData[sortedData.length - 1] : { km: 0 };
                const getM = (type) => [...v.maint].sort((a,b) => new Date(b.d_raw) - new Date(a.d_raw)).find(m => m.t === type) || {d: '---', k: 0};
                
                cont.innerHTML = `
                    <div class="grid grid-cols-2 gap-3">
                        <div class="card p-4">
                            <div class="flex items-center gap-2 mb-2"><i class="bi bi-speedometer2 text-orange-500 text-xs"></i><p class="text-[10px] text-orange-500 uppercase font-bold">Km Attuali</p></div>
                            <p class="text-2xl font-black">${lastEntry.km.toLocaleString()}</p>
                            <p class="text-[9px] text-gray-500">${lastEntry.label ? lastEntry.label.split('-').reverse().join('/') : ''}</p>
                        </div>
                        <div class="card p-4">
                            <div class="flex items-center gap-2 mb-2"><i class="bi bi-wrench-adjustable text-gray-500 text-xs"></i><p class="text-[10px] text-gray-500 uppercase font-bold">Tagliando</p></div>
                            <p class="text-lg font-black">${getM('Tagliando').k.toLocaleString()} km</p>
                            <p class="text-[9px] text-gray-500">${getM('Tagliando').d}</p>
                        </div>
                        <div class="card p-4">
                            <div class="flex items-center gap-2 mb-2"><i class="bi bi-calendar2-check text-orange-500 text-xs"></i><p class="text-[10px] text-orange-500 uppercase font-bold">Revisione</p></div>
                            <p class="text-lg font-bold">${getM('Revisione').d}</p>
                            <p class="text-[9px] text-gray-500">${getM('Revisione').k !== 0 ? getM('Revisione').k.toLocaleString() + ' km' : ''}</p>
                        </div>
                        <div class="card p-4">
                            <div class="flex items-center gap-2 mb-2"><i class="bi bi-disc text-white text-xs"></i><p class="text-[10px] text-white uppercase font-bold">Gomme</p></div>
                            <p class="text-lg font-black">${(lastEntry.km - getM('Cambio Gomme').k).toLocaleString()} km</p>
                            <p class="text-[9px] text-gray-500">${getM('Cambio Gomme').d !== '---' ? 'Dal ' + getM('Cambio Gomme').d : ''}</p>
                        </div>
                    </div>
                    <div class="card p-4"><p class="text-[10px] text-gray-500 uppercase font-bold mb-4 text-center">Andamento Temporale Reale</p><canvas id="chart" height="180"></canvas></div>
                    <div class="card p-5">
                        <div class="flex justify-between items-center mb-4"><h3 class="text-xs font-bold uppercase text-orange-500 tracking-widest">Scadenze</h3><button onclick="showDeadlineForm()" class="text-[10px] bg-[#16161c] px-2 py-1 rounded border border-gray-700 text-gray-400">+ Aggiungi</button></div>
                        <div id="deadlineForm" class="hidden space-y-3 mb-6 bg-[#16161c] p-3 rounded-xl border border-gray-800">
                            <input type="text" id="deadTitle" placeholder="Titolo (es. Assicurazione)" class="input-dark">
                            <div class="flex gap-2"><input type="date" id="deadDate" class="input-dark flex-1"><input type="number" id="deadKm" placeholder="Km limite" class="input-dark flex-1"></div>
                            <button onclick="addDeadline()" class="btn-orange text-[10px] py-2">Salva</button>
                        </div>
                        <div class="space-y-3">${(v.deadlines || []).map((d, i) => {
                            let results = [];
                            if(d.date) { const diff = Math.ceil((new Date(d.date) - new Date()) / 86400000); results.push(diff > 0 ? `${diff} gg` : "Scaduto!"); }
                            if(d.km) { const diffKm = d.km - lastEntry.km; results.push(diffKm > 0 ? `${diffKm.toLocaleString()} km` : "Soglia!"); }
                            const statusStr = results.join(' / ');
                            return `<div class="flex justify-between items-center bg-[#16161c]/50 p-3 rounded-lg border border-gray-800/30"><div><p class="text-sm font-bold text-white">${d.title}</p></div><div class="flex items-center gap-2"><span class="badge-deadline ${statusStr.includes('Scaduto') || statusStr.includes('Soglia') ? 'bg-red-900/30 text-red-500' : 'bg-orange-900/30 text-orange-500'}">${statusStr}</span><button onclick="delDeadline(${i})" class="text-gray-700"><i class="bi bi-x-circle"></i></button></div></div>`;
                        }).join('') || '<p class="text-gray-600 text-[10px] text-center py-2 italic tracking-widest uppercase">Tutto Sotto Controllo</p>'}</div>
                    </div>
                `;
                if(sortedData.length > 0) { setTimeout(() => renderChart(sortedData), 100); }
            }

            if (tab === 'km') {
                const logs = [...v.kmLogs].sort((a,b) => new Date(b.d) - new Date(a.d));
                cont.innerHTML = `
                    <div class="card p-5 space-y-4">
                        <h3 class="font-bold text-xs text-orange-500 uppercase">Nuova Lettura</h3>
                        <div class="flex gap-2">
                            <input type="date" id="kDate" class="input-dark flex-1" value="${new Date().toISOString().split('T')[0]}">
                            <input type="number" id="kVal" placeholder="Km totali" class="input-dark flex-1">
                        </div>
                        <input type="text" id="kDesc" placeholder="Descrizione (es. Viaggio)" class="input-dark">
                        <button onclick="addKm()" class="btn-orange text-sm">Registra</button>
                    </div>
                    <div class="card p-5">
                        <h3 class="text-[10px] font-bold uppercase text-gray-500 mb-4 tracking-widest">Storico</h3>
                        <div class="divide-y divide-gray-800">
                            ${logs.map((l, i) => `
                                <div class="flex justify-between items-start py-3">
                                    <div>
                                        <p class="text-white font-bold">${parseInt(l.v).toLocaleString()} km</p>
                                        <p class="text-[10px] text-gray-500">${l.d.split('-').reverse().join('/')}</p>
                                        ${l.desc ? `<p class="text-[10px] text-orange-500/80 mt-1 italic">${l.desc}</p>` : ''}
                                    </div>
                                    <button onclick="delKm(${i})" class="text-gray-700 pt-1"><i class="bi bi-trash"></i></button>
                                </div>`).join('') || '<p class="text-gray-600 text-xs italic">Nessun dato.</p>'}
                        </div>
                    </div>`;
            }

            if (tab === 'maint') {
                const logs = [...v.maint].sort((a,b) => new Date(b.d_raw) - new Date(a.d_raw));
                cont.innerHTML = `<div class="card p-5 space-y-4 mb-4"><h3 class="font-bold text-xs text-orange-500 uppercase">Nuovo Intervento</h3>
                    <select id="mType" class="input-dark"><option>Tagliando</option><option>Revisione</option><option>Cambio Gomme</option><option>Inversione Gomme</option><option>Ricambi</option><option>Altro</option></select>
                    <div class="flex gap-2"><input type="date" id="mDate" class="input-dark flex-1" value="${new Date().toISOString().split('T')[0]}"><input type="number" id="mKm" placeholder="Km" class="input-dark flex-1"></div>
                    <textarea id="mDesc" placeholder="Descrizione lavori (opzionale)" class="input-dark h-20"></textarea>
                    <button onclick="addM()" class="btn-orange text-sm">Salva Intervento</button></div>
                    <div class="card p-5"><h3 class="text-[10px] font-bold uppercase text-gray-500 mb-4 tracking-widest">Officina</h3><div class="space-y-3">${logs.map((m, i) => `
                    <div class="bg-[#16161c] p-3 rounded-xl border border-gray-800">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <div class="bg-orange-500/10 p-2.5 rounded-lg border border-orange-500/20">
                                    <i class="bi ${iconMap[m.t] || 'bi-tools'} text-orange-500"></i>
                                </div>
                                <div><p class="text-orange-500 font-bold text-sm leading-tight">${m.t}</p><p class="text-[10px] text-white mt-0.5">${m.k.toLocaleString()} km • ${m.d}</p></div>
                            </div>
                            <button onclick="delM(${i})" class="text-gray-700 p-1"><i class="bi bi-trash"></i></button>
                        </div>
                        ${m.desc ? `<p class="mt-2 text-[11px] text-gray-400 border-t border-gray-800 pt-2">${m.desc}</p>` : ''}
                    </div>`).join('') || '<p class="text-gray-600 text-xs italic text-center py-4">Nessun intervento registrato.</p>'}</div></div>`;
            }

            if (tab === 'settings') {
                cont.innerHTML = `
                    <div class="card p-5 space-y-4">
                        <h3 class="font-bold text-orange-500 uppercase text-xs" id="formTitle">Aggiungi Veicolo</h3>
                        <select id="vTipo" class="input-dark"><option value="auto">Auto</option><option value="moto">Moto</option></select>
                        <div class="grid grid-cols-2 gap-2"><input type="text" id="vMarca" placeholder="Marca" class="input-dark"><input type="text" id="vMod" placeholder="Modello" class="input-dark"></div>
                        <div class="grid grid-cols-2 gap-2"><input type="text" id="vTargaInput" placeholder="Targa" class="input-dark"><input type="number" id="vAnnoInput" placeholder="Anno" class="input-dark"></div>
                        <button onclick="saveVehicle()" id="btnSaveV" class="btn-orange text-sm">Salva Veicolo</button>
                        <button onclick="cancelEdit()" id="btnCancelEdit" class="hidden text-xs text-gray-500 w-full text-center py-2">Annulla Modifica</button>
                    </div>
                    <div class="space-y-3 mt-6">
                        ${window.db.vehicles.map(veh => `
                            <div class="card p-4 flex justify-between items-center border-gray-800/50">
                                <div><p class="font-bold text-white text-sm">${veh.tipo === 'moto' ? '🏍️' : '🚗'} ${veh.marca} ${veh.modello}</p><p class="text-[10px] text-gray-500 font-mono">${veh.targa} • ${veh.anno}</p></div>
                                <div class="flex gap-4"><button onclick="editVehicle(${veh.id})" class="text-orange-500 text-lg"><i class="bi bi-pencil-square"></i></button><button onclick="deleteVehicle(${veh.id})" class="text-red-900/60 text-lg"><i class="bi bi-trash3"></i></button></div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // --- HELPER FUNCTIONS ---
        window.getAllKmSorted = (v) => {
            let combined = [];
            v.kmLogs.forEach(l => combined.push({ date: new Date(l.d), km: parseInt(l.v), label: l.d }));
            v.maint.forEach(m => { if(m.k) combined.push({ date: new Date(m.d_raw), km: parseInt(m.k), label: m.d_raw }); });
            return combined.sort((a, b) => a.date - b.date);
        }

        window.updateHeader = () => {
            const v = window.db.vehicles.find(x => x.id === window.db.activeId);
            if(v) {
                document.getElementById('vName').innerText = `${v.marca} ${v.modello}`;
                document.getElementById('vTarga').innerText = v.targa || '------';
                document.getElementById('vAnno').innerText = v.anno || '----';
                document.getElementById('headerIcon').className = v.tipo === 'moto' ? 'bi bi-bicycle text-orange-500 text-xl' : 'bi bi-car-front-fill text-orange-500 text-xl';
            } else {
                document.getElementById('vName').innerText = "Nessun Mezzo";
            }
            document.getElementById('vMenu').innerHTML = window.db.vehicles.map(veh => `<div class="v-opt" onclick="selV(${veh.id})">${veh.tipo === 'moto' ? '🏍️' : '🚗'} ${veh.marca} ${veh.modello}</div>`).join('');
        }

        window.renderChart = (dataPoints) => {
            const ctx = document.getElementById('chart'); if(!ctx) return;
            const chartData = dataPoints.map(p => ({ x: p.date.getTime(), y: p.km }));
            new Chart(ctx, { 
                type: 'line', 
                data: { datasets: [{ data: chartData, borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.05)', tension: 0.2, fill: true, pointRadius: 4, pointBackgroundColor: '#f97316', borderWidth: 2 }] }, 
                options: { 
                    responsive: true, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { grid: { color: '#2a2a32' }, ticks: { color: '#6b7280', font: { size: 10 } } }, 
                        x: { type: 'linear', grid: { display: false }, ticks: { color: '#6b7280', font: { size: 9 }, maxTicksLimit: 5, callback: (v) => new Date(v).toLocaleDateString('it-IT', { month: 'short', year: '2-digit' }) } } 
                    } 
                } 
            });
        }

        // --- AZIONI ---
        window.saveVehicle = () => { 
            const t = document.getElementById('vTipo').value, ma = document.getElementById('vMarca').value, mo = document.getElementById('vMod').value, ta = document.getElementById('vTargaInput').value, an = document.getElementById('vAnnoInput').value; 
            if(!ma || !mo) return; 
            if (window.editingId) { 
                Object.assign(window.db.vehicles.find(x => x.id === window.editingId), { tipo:t, marca:ma, modello:mo, targa:ta, anno:an }); 
                window.editingId = null; 
            } else { 
                const id = Date.now(); 
                window.db.vehicles.push({ id, tipo:t, marca:ma, modello:mo, targa:ta, anno:an, kmLogs: [], maint: [], deadlines: [] }); 
                window.db.activeId = id; 
            } 
            save(); updateHeader(); render('settings'); 
        }

        window.addKm = () => { 
            const v = window.db.vehicles.find(x => x.id === window.db.activeId); 
            const val = document.getElementById('kVal').value, date = document.getElementById('kDate').value, desc = document.getElementById('kDesc').value;
            if(!val || !v) return; 
            v.kmLogs.push({ d: date, v: parseInt(val), desc: desc }); 
            save(); switchTab('dashboard'); 
        }

        window.addM = () => { 
            const v = window.db.vehicles.find(x => x.id === window.db.activeId); 
            const t = document.getElementById('mType').value, d = document.getElementById('mDate').value, k = document.getElementById('mKm').value, desc = document.getElementById('mDesc').value; 
            if(!k || !v) return; 
            v.maint.unshift({ t, d: d.split('-').reverse().join('/'), d_raw: d, k: parseInt(k), desc }); 
            save(); switchTab('dashboard'); 
        }

        window.addDeadline = () => { 
            const v = window.db.vehicles.find(x => x.id === window.db.activeId); 
            const title = document.getElementById('deadTitle').value, date = document.getElementById('deadDate').value, km = document.getElementById('deadKm').value; 
            if(!v || !title) return; 
            if(!v.deadlines) v.deadlines = []; 
            v.deadlines.push({ title, date, km: km ? parseInt(km) : null }); 
            save(); render('dashboard'); 
        }

        window.deleteVehicle = (id) => { if(confirm("Eliminare?")) { window.db.vehicles = window.db.vehicles.filter(x => x.id !== id); if(window.db.activeId === id) window.db.activeId = window.db.vehicles.length ? window.db.vehicles[0].id : null; save(); updateHeader(); render('settings'); } }
        window.selV = (id) => { window.db.activeId = id; save(); updateHeader(); document.getElementById('vMenu').classList.remove('show'); switchTab('dashboard'); }
        window.showDeadlineForm = () => document.getElementById('deadlineForm').classList.toggle('hidden');
        window.delKm = (i) => { const v = window.db.vehicles.find(x => x.id === window.db.activeId); v.kmLogs.splice(i, 1); save(); render('km'); }
        window.delM = (i) => { const v = window.db.vehicles.find(x => x.id === window.db.activeId); v.maint.splice(i, 1); save(); render('maint'); }
        window.delDeadline = (i) => { const v = window.db.vehicles.find(x => x.id === window.db.activeId); v.deadlines.splice(i, 1); save(); render('dashboard'); }

        // Inizializzazione
        window.loadFromCloud();

    </script>
</body>
</html>
