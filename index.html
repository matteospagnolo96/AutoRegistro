<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Car & Moto Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { background-color: #0f0f13; color: #e5e7eb; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background-color: #1e1e24; border-radius: 1.25rem; border: 1px solid #2a2a32; }
        .input-dark { background-color: #16161c; border: 1px solid #2a2a32; color: white; border-radius: 0.75rem; padding: 0.8rem; width: 100%; outline: none; font-size: 0.9rem; }
        .input-dark:focus { border-color: #f97316; }
        .btn-orange { background-color: #f97316; color: black; font-weight: 800; border-radius: 0.75rem; padding: 1rem; width: 100%; cursor: pointer; text-transform: uppercase; }
        .nav-top-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; font-size: 0.65rem; font-weight: 700; color: #6b7280; flex: 1; padding: 0.8rem 0; border-bottom: 2px solid transparent; }
        .nav-top-item.active { color: #f97316; border-bottom: 2px solid #f97316; background: linear-gradient(to bottom, transparent, rgba(249, 115, 22, 0.05)); }
        .vehicle-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #16161c; border: 1px solid #2a2a32; display: none; z-index: 100; border-radius: 0 0 1rem 1rem; }
        .vehicle-dropdown.show { display: block; }
        .v-opt { padding: 1rem; border-bottom: 1px solid #2a2a32; color: #9ca3af; cursor: pointer; }
        .badge-deadline { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 0.5rem; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <div id="app" class="max-w-md mx-auto">
        <header class="bg-[#0f0f13] border-b border-gray-800/50 sticky top-0 z-50">
            <div class="p-4 flex items-center justify-between cursor-pointer" onclick="toggleMenu()">
                <div class="flex items-center gap-3">
                    <div class="bg-[#1e1e24] p-2.5 rounded-xl border border-gray-800 shadow-lg">
                        <i id="headerIcon" class="bi bi-car-front-fill text-orange-500 text-xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span id="vName" class="text-lg font-black text-white uppercase leading-none tracking-tight">Nessun Mezzo</span>
                        <div class="flex items-center gap-1.5 mt-1">
                            <span id="vTarga" class="text-[10px] text-gray-400 font-mono font-bold">------</span>
                            <span class="text-gray-600 text-[10px]">•</span>
                            <span id="vAnno" class="text-[10px] text-gray-400 font-bold">----</span>
                        </div>
                    </div>
                    <i class="bi bi-chevron-down text-orange-500 text-xs ml-auto"></i>
                </div>
            </div>
            <div id="vMenu" class="vehicle-dropdown shadow-2xl"></div>

            <nav class="flex justify-around border-t border-gray-800/30">
                <button onclick="switchTab('dashboard')" class="nav-top-item active" id="t-dashboard"><i class="bi bi-grid-1x2-fill text-lg"></i>Dashboard</button>
                <button onclick="switchTab('km')" class="nav-top-item" id="t-km"><i class="bi bi-speedometer2 text-lg"></i>Km</button>
                <button onclick="switchTab('maint')" class="nav-top-item" id="t-maint"><i class="bi bi-tools text-lg"></i>Officina</button>
                <button onclick="switchTab('settings')" class="nav-top-item" id="t-settings"><i class="bi bi-gear-fill text-lg"></i>Mezzi</button>
            </nav>
        </header>

        <div id="content" class="p-4 space-y-4 pb-20"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('carTrackerDB_v4')) || { activeId: null, vehicles: [], cloud: { key: '', bin: '' } };
        let editingId = null;

        function save() { localStorage.setItem('carTrackerDB_v4', JSON.stringify(db)); }
        function toggleMenu() { document.getElementById('vMenu').classList.toggle('show'); }

        async function syncCloud(mode) {
            if (!db.cloud.key || !db.cloud.bin) return alert("Inserisci API Key e Bin ID");
            const btn = event.target; btn.innerText = "...";
            try {
                if (mode === 'push') {
                    await fetch(`https://api.jsonbin.io/v3/b/${db.cloud.bin}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': db.cloud.key },
                        body: JSON.stringify(db)
                    });
                    alert("Dati caricati!");
                } else {
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${db.cloud.bin}/latest`, {
                        headers: { 'X-Master-Key': db.cloud.key }
                    });
                    const data = await res.json();
                    db = data.record; save(); updateHeader(); render('dashboard');
                    alert("Dati scaricati!");
                }
            } catch (e) { alert("Errore sync"); }
            btn.innerText = mode === 'push' ? 'Carica Online' : 'Scarica Online';
        }

        function getAllKmSorted(v) {
            let combined = [];
            v.kmLogs.forEach(l => combined.push({ date: new Date(l.d), km: parseInt(l.v) }));
            v.maint.forEach(m => { if(m.k) combined.push({ date: new Date(m.d_raw), km: parseInt(m.k) }); });
            return combined.sort((a, b) => a.date - b.date);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-top-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`t-${tab}`).classList.add('active');
            render(tab);
        }

        function render(tab) {
            const cont = document.getElementById('content');
            const v = db.vehicles.find(x => x.id === db.activeId);
            
            if (!v && tab !== 'settings') {
                cont.innerHTML = `<div class="card p-10 text-center"><p class="text-gray-400">Aggiungi un mezzo in 'Mezzi'</p></div>`;
                return;
            }

            if (tab === 'dashboard') {
                const sortedData = getAllKmSorted(v);
                const lastEntry = sortedData.length ? sortedData[sortedData.length - 1] : { km: 0 };
                const getM = (type) => [...v.maint].sort((a,b) => new Date(b.d_raw) - new Date(a.d_raw)).find(m => m.t === type) || {d: '---', k: 0};
                
                cont.innerHTML = `
                    <div class="grid grid-cols-2 gap-3">
                        <div class="card p-4"><p class="text-[10px] text-orange-500 uppercase font-bold">Km Attuali</p><p class="text-2xl font-black">${lastEntry.km.toLocaleString()}</p></div>
                        <div class="card p-4"><p class="text-[10px] text-gray-500 uppercase font-bold">Ultimo Tagliando</p><p class="text-lg font-bold">${getM('Tagliando').d}</p></div>
                    </div>
                    <div class="card p-4"><canvas id="chart" height="180"></canvas></div>
                    <div class="card p-5">
                        <div class="flex justify-between items-center mb-4"><h3 class="text-xs font-bold uppercase text-orange-500">Scadenze</h3><button onclick="showDeadlineForm()" class="text-[10px] text-gray-400">+ Aggiungi</button></div>
                        <div id="deadlineForm" class="hidden space-y-3 mb-4">
                            <input type="text" id="deadTitle" placeholder="Titolo" class="input-dark">
                            <div class="flex gap-2"><input type="date" id="deadDate" class="input-dark"><input type="number" id="deadKm" placeholder="Km limite" class="input-dark"></div>
                            <button onclick="addDeadline()" class="btn-orange text-[10px] py-2">Salva</button>
                        </div>
                        <div class="space-y-2">${(v.deadlines || []).map((d, i) => {
                            let status = "";
                            if(d.date) status += Math.ceil((new Date(d.date) - new Date()) / 86400000) + " gg ";
                            if(d.km) status += (d.km - lastEntry.km).toLocaleString() + " km";
                            return `<div class="flex justify-between items-center bg-[#16161c] p-3 rounded-lg"><span class="text-sm">${d.title}</span><span class="badge-deadline bg-orange-900/30 text-orange-500">${status}</span></div>`;
                        }).join('')}</div>
                    </div>`;
                if(sortedData.length > 0) setTimeout(() => renderChart(sortedData), 100);
            }

            if (tab === 'km') {
                cont.innerHTML = `<div class="card p-5 space-y-4"><h3 class="font-bold text-xs text-orange-500 uppercase">Nuova Lettura</h3><input type="date" id="kDate" class="input-dark" value="${new Date().toISOString().split('T')[0]}"><input type="number" id="kVal" placeholder="Km totali" class="input-dark"><button onclick="addKm()" class="btn-orange">Registra</button></div>`;
            }

            if (tab === 'maint') {
                cont.innerHTML = `<div class="card p-5 space-y-4 mb-4">
                    <select id="mType" class="input-dark"><option>Tagliando</option><option>Revisione</option><option>Cambio Gomme</option><option>Inversione Gomme</option><option>Altro</option></select>
                    <div class="flex gap-2"><input type="date" id="mDate" class="input-dark"><input type="number" id="mKm" placeholder="Km" class="input-dark"></div>
                    <textarea id="mDesc" placeholder="Descrizione" class="input-dark h-20"></textarea>
                    <button onclick="addM()" class="btn-orange">Salva</button></div>
                    <div class="space-y-3">${v.maint.map(m => `<div class="card p-3"><p class="text-orange-500 font-bold">${m.t}</p><p class="text-xs">${m.k.toLocaleString()} km - ${m.d}</p><p class="text-[10px] text-gray-500 mt-1">${m.desc || ''}</p></div>`).join('')}</div>`;
            }

            if (tab === 'settings') {
                cont.innerHTML = `
                    <div class="card p-5 space-y-4"><h3 class="text-xs font-bold text-orange-500 uppercase">Sincronizzazione Cloud</h3>
                        <input type="text" id="cKey" placeholder="API Key" class="input-dark" value="${db.cloud.key}" onchange="db.cloud.key=this.value;save()">
                        <input type="text" id="cBin" placeholder="Bin ID" class="input-dark" value="${db.cloud.bin}" onchange="db.cloud.bin=this.value;save()">
                        <div class="flex gap-2"><button onclick="syncCloud('push')" class="flex-1 bg-blue-600 p-2 rounded text-[10px] font-bold">Carica Online</button><button onclick="syncCloud('pull')" class="flex-1 bg-green-600 p-2 rounded text-[10px] font-bold">Scarica Online</button></div>
                    </div>
                    <div class="card p-5 space-y-4"><h3 class="text-xs font-bold text-orange-500 uppercase">Aggiungi Mezzo</h3>
                        <input type="text" id="vMarca" placeholder="Marca" class="input-dark"><input type="text" id="vMod" placeholder="Modello" class="input-dark">
                        <button onclick="saveVehicle()" class="btn-orange">Aggiungi</button>
                    </div>
                    <div class="space-y-2">${db.vehicles.map(veh => `<div class="card p-4 flex justify-between items-center"><p>${veh.marca} ${veh.modello}</p><button onclick="selV(${veh.id})" class="text-orange-500"><i class="bi bi-check-circle"></i></button></div>`).join('')}</div>`;
            }
        }

        function renderChart(dataPoints) {
            const ctx = document.getElementById('chart');
            const chartData = dataPoints.map(p => ({ x: p.date.getTime(), y: p.km }));
            new Chart(ctx, { type: 'line', data: { datasets: [{ data: chartData, borderColor: '#f97316', tension: 0.1 }] }, options: { plugins: { legend: { display: false } }, scales: { x: { type: 'linear', ticks: { callback: (v) => new Date(v).toLocaleDateString('it-IT', {month:'short', year:'2-digit'}), maxTicksLimit: 5 } } } } });
        }

        function saveVehicle() { 
            const ma = document.getElementById('vMarca').value, mo = document.getElementById('vMod').value;
            const id = Date.now(); db.vehicles.push({ id, marca:ma, modello:mo, kmLogs: [], maint: [], deadlines: [] });
            db.activeId = id; save(); updateHeader(); render('settings');
        }

        function updateHeader() {
            const v = db.vehicles.find(x => x.id === db.activeId);
            if(v) { document.getElementById('vName').innerText = `${v.marca} ${v.modello}`; }
            document.getElementById('vMenu').innerHTML = db.vehicles.map(veh => `<div class="v-opt" onclick="selV(${veh.id})">${veh.marca} ${veh.modello}</div>`).join('');
        }

        function addKm() { 
            const v = db.vehicles.find(x => x.id === db.activeId);
            v.kmLogs.push({ d: document.getElementById('kDate').value, v: document.getElementById('kVal').value });
            save(); switchTab('dashboard');
        }

        function addM() {
            const v = db.vehicles.find(x => x.id === db.activeId);
            const d = document.getElementById('mDate').value;
            v.maint.unshift({ t: document.getElementById('mType').value, d: d.split('-').reverse().join('/'), d_raw: d, k: parseInt(document.getElementById('mKm').value), desc: document.getElementById('mDesc').value });
            save(); switchTab('dashboard');
        }

        function addDeadline() {
            const v = db.vehicles.find(x => x.id === db.activeId);
            v.deadlines.push({ title: document.getElementById('deadTitle').value, date: document.getElementById('deadDate').value, km: parseInt(document.getElementById('deadKm').value) });
            save(); render('dashboard');
        }

        function showDeadlineForm() { document.getElementById('deadlineForm').classList.toggle('hidden'); }
        function selV(id) { db.activeId = id; save(); updateHeader(); toggleMenu(); switchTab('dashboard'); }

        updateHeader(); switchTab('dashboard');
    </script>
</body>
</html>
